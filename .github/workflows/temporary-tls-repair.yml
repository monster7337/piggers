name: Temporary TLS repair

on:
  workflow_dispatch:
    inputs:
      apply_changes:
        description: Apply the verified TLS and HTTP/2 changes
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install SSH client helper
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Inspect or repair Nginx
        env:
          SSHPASS: ${{ secrets.TLS_REPAIR_SERVER_PASSWORD }}
          SERVER_HOST: ${{ secrets.TLS_REPAIR_SERVER_HOST }}
          APPLY_CHANGES: ${{ inputs.apply_changes }}
        run: |
          set -Eeuo pipefail

          ssh_args=(
            -o StrictHostKeyChecking=no
            -o UserKnownHostsFile=/dev/null
            -o ConnectTimeout=20
            -o ServerAliveInterval=10
            -o ServerAliveCountMax=2
          )

          if [[ "$APPLY_CHANGES" != "true" ]]; then
            sshpass -e ssh "${ssh_args[@]}" "root@$SERVER_HOST" \
              "nginx -v 2>&1; openssl version; nginx -T 2>&1 | grep -nE 'configuration file|server_name|listen .*443|http2|ssl_protocols|options-ssl-nginx'"
            exit 0
          fi

          sshpass -e ssh "${ssh_args[@]}" "root@$SERVER_HOST" bash -s <<'REMOTE'
          set -Eeuo pipefail

          timestamp="$(date +%Y%m%d-%H%M%S)"
          backup_dir="/var/backups/nginx-before-tls12-$timestamp"
          mkdir -p "$backup_dir"

          mapfile -t active_files < <(
            nginx -T 2>&1 | sed -n 's/^# configuration file \(.*\):$/\1/p' | sort -u
          )

          mapfile -t site_files < <(
            for entry in /etc/nginx/sites-enabled/*; do
              [[ -e "$entry" ]] && readlink -f "$entry"
            done | sort -u
          )

          for file in "${active_files[@]}" "${site_files[@]}"; do
            [[ -f "$file" ]] || continue
            mkdir -p "$backup_dir$(dirname "$file")"
            cp -a "$file" "$backup_dir$file"
          done

          protocol_files=()
          for file in "${active_files[@]}"; do
            if [[ -f "$file" ]] && grep -qE '^[[:space:]]*ssl_protocols[[:space:]]' "$file"; then
              protocol_files+=("$file")
            fi
          done

          if ((${#protocol_files[@]})); then
            for file in "${protocol_files[@]}"; do
              sed -Ei 's/^([[:space:]]*)ssl_protocols[[:space:]]+[^;]+;/\1ssl_protocols TLSv1.2;/' "$file"
            done
          else
            printf '%s\n' 'ssl_protocols TLSv1.2;' > /etc/nginx/conf.d/tls12-compat.conf
          fi

          for file in "${site_files[@]}"; do
            perl -0pi -e 's/(listen\s+[^;\n]*\b443\b[^;\n]*\bssl\b)(?![^;\n]*\bhttp2\b)(\s*;)/$1 http2$2/g' "$file"
          done

          nginx -t
          systemctl reload nginx
          systemctl is-active nginx

          echo '--- active TLS and HTTP/2 directives ---'
          nginx -T 2>&1 | grep -nE 'server_name|listen .*443|http2|ssl_protocols'

          echo '--- TLS 1.2 and ALPN check ---'
          echo | openssl s_client -connect 127.0.0.1:443 -servername piggyland.ru -tls1_2 -alpn h2 2>/dev/null \
            | grep -E 'Protocol|Cipher is|ALPN protocol'

          echo '--- TLS 1.3 rejection check ---'
          if echo | openssl s_client -connect 127.0.0.1:443 -servername piggyland.ru -tls1_3 >/tmp/tls13-check.log 2>&1; then
            echo 'TLS 1.3 is still accepted'
            exit 1
          else
            echo 'TLS 1.3 is disabled as expected'
          fi

          echo '--- HTTPS checks ---'
          for domain in piggyland.ru xn----8sbenzf6e.xn--p1ai animalplaces.ru; do
            curl -fsS --tlsv1.2 --tls-max 1.2 --resolve "$domain:443:127.0.0.1" \
              -o /dev/null -w "$domain HTTP %{http_code}\n" "https://$domain/"
          done

          echo "Backup: $backup_dir"
          REMOTE
